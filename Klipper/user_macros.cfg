# PROBE CALIBRATION
[gcode_macro PROBE_CALIBRATION]
description: Safe PROBE_CALIBRATE for delta
gcode:
    G28
    G90
    G1 X0 Y0 Z20 F6000
    PROBE_CALIBRATE

# PARK AFTER PAUSE
[gcode_macro _TOOLHEAD_PARK_PAUSE_CANCEL]
description: Delta-safe smart park (center only)
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE']|default({}) %}
  {% set velocity = printer.configfile.settings.pause_resume.recover_velocity %}
  {% set park_dz = client.custom_park_dz|default(8.0)|abs %}
  {% set sp_hop  = client.speed_hop|default(20) * 60 %}
  {% set sp_move = client.speed_move|default(velocity) * 60 %}

  {% set act = printer.gcode_move.gcode_position %}
  {% set max = printer.toolhead.axis_maximum %}
  {% set origin = printer.gcode_move.homing_origin %}

  {% set safety = 2.0 %}
  {% set z_max_safe = max.z - origin.z - safety %}
  {% set lift = park_dz if act.z + park_dz <= z_max_safe else z_max_safe - act.z %}
  {% if lift < 0 %}{% set lift = 0 %}{% endif %}

  _CLIENT_RETRACT

  {% if "xyz" in printer.toolhead.homed_axes %}
    G91
    {% if lift > 0 %}
      G1 Z{lift|round(3)} F{sp_hop}
    {% endif %}
    G90
    G1 X0 Y0 F{sp_move}
  {% else %}
    RESPOND TYPE=echo MSG="Printer not homed"
  {% endif %}


# FILAMENT RUNOUT
[gcode_macro FILAMENT_RUNOUT]
description: Smart filament runout handling
gcode:
    M400
    PAUSE
    RESPOND MSG="Filament runout detected"
    
    # Lift head safely
    {% set z = printer.toolhead.position.z + 10 %}
    {% if z > printer.toolhead.axis_maximum.z %}
        {% set z = printer.toolhead.axis_maximum.z %}
    {% endif %}
    
    G91
    G1 Z10 F1200
    G90
    
    # Move to safe center (best for delta)
    G1 X0 Y0 F6000
    
    # Retract filament from hotend
    G91
    G1 E-30 F1200
    G90

# FILAMENT INSERT    
[gcode_macro FILAMENT_INSERT]
description: Resume after filament insert
gcode:
    RESPOND MSG="Filament inserted"

# LOAD FILAMENT
[gcode_macro LOAD_FILAMENT]
gcode:
    M109 S{printer.extruder.target}
    G91
    G1 E40 F300
    G1 E20 F120
    G90

# RESUME PRINT
[gcode_macro RESUME_PRINT]
gcode:
    G91
    G1 E10 F200
    G90
    RESUME

# PRINT_END
[gcode_macro PRINT_END]
gcode:
    M400
    G92 E0
    G1 E-2 F3600
    TURN_OFF_HEATERS
    G91
    G1 Z10 F3000
    G90
    G1 X0 Y0 F6000
    M84
    
    