# This file contains common pin mappings for the BIGTREETECH Manta M8P V2.0
# To use this config, the firmware should be compiled for the
# STM32H723 with a "128KiB bootloader" "25 MHz crystal"
# and "USB (on PA11/PA12)", "CAN bus (on PD0/PD1)" or Serial (on USART1 PA10/PA9).

# See docs/Config_Reference.md for a description of parameters.
[include mainsail.cfg]
[include user_macros.cfg]

[idle_timeout]
timeout: 1800  ; Sets timeout to 1 hour (in seconds)
gcode:
    TURN_OFF_HEATERS
    M84 ; Disable motors

# Motor1
[stepper_a]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PF4
homing_speed: 60
# The next parameter needs to be adjusted for
# your printer. You may want to start with 280
# and meassure the distance from nozzle to bed.
# This value then needs to be added.
#position_endstop:464.38
#arm_length: 405.600000     # Note! The actual diagonal_rod is 400mm but the effective arm length is longer due to the diagonal ball joints. This value is a good starting point but may need to be adjusted for your printer.

# Motor2
[stepper_b]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PF3
homing_speed: 60

# Motor3
[stepper_c]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PF2
homing_speed: 60

## Motor4
# The M8P only has 4 heater outputs which leaves an extra stepper
# This can be used for a second Z stepper, dual_carriage, extruder co-stepper,
# or other accesory such as an MMU
#[stepper_]
#step_pin: PB4
#dir_pin: PB3
#enable_pin: !PB6
#endstop_pin: ^PF1
#...

# Motor5
[extruder]
step_pin: PG13
dir_pin: PG12
enable_pin: !PG15
microsteps:  16
# Titan extruder
rotation_distance: 7.5

nozzle_diameter: 0.4
filament_diameter: 1.75
heater_pin: PA0 # HE0
sensor_pin: PB0 # T0
sensor_type: EPCOS 100K B57560G104F
max_extrude_only_velocity: 25
max_extrude_only_accel: 400
#max_extrude_only_velocity: 30
#max_extrude_only_accel: 500
#max_extrude_only_distance: 6
#control = pid
#pid_kp = 46.214
#pid_ki = 4.969
#pid_kd = 107.447

min_extrude_temp: 150
min_temp: 0
max_temp: 320

## End-Stop 5
#[filament_switch_sensor material_0]
#switch_pin: PF0

## Motor6
#[extruder1]
#step_pin: PG9
#dir_pin: PD7
#enable_pin: !PG11 
#heater_pin: PA1 # HE1 
#sensor_pin: PC5 # T1
#...

## End-Stop 6
#[filament_switch_sensor material_1]
#switch_pin: PC15

## Motor7
#[extruder2]
#step_pin: PD4
#dir_pin: PD3
#enable_pin: !PD6
#heater_pin: PA3 # HE2
#sensor_pin: PC4 # T2
#...

## Motor8
#[extruder3]
#step_pin: PC7
#dir_pin: PC8
#enable_pin: !PD2
#heater_pin: PA5 # HE3
#sensor_pin: PA7 # T3
#...

[heater_bed]
heater_pin: PF5
sensor_pin: PB1 # TB 
sensor_type: EPCOS 100K B57560G104F
control: watermark
min_temp: 0
max_temp: 130
max_power: 1.0

[verify_heater heater_bed]
check_gain_time: 360 # (default is usually 60)
hysteresis: 15
max_error: 1200

#[fan_generic soc-fan]
#pin: host:gpio79  #CB1
#pin: host:gpio26  #CM4

# Fan0
[fan]
pin: PF7
max_power: 1.0
kick_start_time: 0.5
off_below: 0.1

## Fan1
[heater_fan hotend_fan]
pin: PF9
heater: extruder
heater_temp: 50.0

## Fan2
#[heater_fan fan2]
#pin: PF6

## Fan3
#[heater_fan fan3]
#pin: PF8

## Fan4
#[heater_fan fan4]
#pin: PA4

## Fan5
#[heater_fan fan5]
#pin: PA6
#tachometer_pin: PC2

## Fan6
[temperature_fan pi_fan]
pin: !PA2
max_power: 1.0
sensor_type: temperature_host
control: watermark
target_temp: 48 # Target temperature to maintain (Celsius)
min_temp: 0
max_temp: 90
off_below: 0.10
kick_start_time: 0.50
max_speed: 0.8 # Adjust max speed if a specific fan speed limit is desired
min_speed: 0.3 # Adjust min speed for minimum operation

#tachometer_pin: PC1

[temperature_sensor extruder_motor]
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
min_temp: 0
max_temp: 75

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_47002D001251313531383332-if00

[printer]
kinematics: delta
max_velocity: 80  #400
max_accel: 2000 #3000
max_z_velocity: 80 # 200
max_z_accel: 100

delta_radius = 217.5 # (DELTA_SMOOTH_ROD_OFFSET-DELTA_EFFECTOR_OFFSET-DELTA_CARRIAGE_OFFSET)  F.ex. 272 - 30 - 28
# KosselXL DIY: 215.95
# DELTA_SMOOTH_ROD_OFFSET = 268.5
# DELTA_EFFECTOR_OFFSET = 22.22
# DELTA_CARRIAGE_OFFSET = 28
# DELTA_EFFECTOR_OFFSET = distance between the effectoe center to the diagonal ball / sqrt(3) or 1.732 
# if you want to DELTA_CALIBRATE you may need that
minimum_z_position: -5

[delta_calibrate]
radius: 120

[bed_mesh]
speed: 60
horizontal_move_z: 8
mesh_radius: 120
mesh_origin: 0, 0
round_probe_count: 7
algorithm: bicubic

# Runout switch
[filament_switch_sensor filament_sensor]
switch_pin: PF0
pause_on_runout: False
runout_gcode:
    FILAMENT_RUNOUT
insert_gcode:
    FILAMENT_INSERT
event_delay: 1.0

# Motion / jam detection
[filament_motion_sensor filament_motion]
switch_pin: PC15
extruder: extruder
detection_length: 10
pause_on_runout: False
runout_gcode:
    FILAMENT_RUNOUT


