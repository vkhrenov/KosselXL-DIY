[bltouch]
sensor_pin: ^PD13
control_pin: PD12

x_offset: 0
y_offset: 31.3
#z_offset: 0         

pin_move_time: 0.7
stow_on_each_sample: True
samples: 2

probe_with_touch_mode: True
pin_up_touch_mode_reports_triggered: False
pin_up_reports_not_triggered: True

  
